<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NatureLab | Configurações</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/cards.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/darkmode.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>NatureLab</h1>
          <p>Configurações</p>
        </div>
        <nav class="topnav">
          <a href="../index.html">Início</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="novo-registro.html">Novo Registro</a>
          <a href="especies.html">Espécies</a>
          <a href="backup.html">Backup</a>
          <a href="configuracoes.html" class="active">Configurações</a>
        </nav>
      </header>

      <main class="page-grid">
        <section class="card">
          <h2>Preferências</h2>
          <div class="field">
            <label
              >Tema<select id="theme-select">
                <option value="light">Claro</option>
                <option value="dark">Escuro</option>
              </select></label
            >
          </div>
          <div class="field">
            <label
              >Idioma<select id="language-select">
                <option value="pt-BR">Português</option>
                <option value="en-US">English</option>
              </select></label
            >
          </div>
          <div class="field">
            <label
              ><input type="checkbox" id="auto-backup" /> Exportação
              automática</label
            >
          </div>
          <div class="field">
            <label
              ><input type="checkbox" id="auto-save" /> Backup automático</label
            >
          </div>
          <button id="btn-clear-data" class="btn btn-danger">
            Limpar dados
          </button>
        </section>
      </main>
    </div>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/config.js"></script>
  </body>
</html>

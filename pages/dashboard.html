<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NatureLab | Dashboard</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/cards.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/modal.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/darkmode.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>NatureLab</h1>
          <p>Dashboard</p>
        </div>
        <nav class="topnav">
          <a href="../index.html">Início</a>
          <a href="dashboard.html" class="active">Dashboard</a>
          <a href="novo-registro.html">Novo Registro</a>
          <a href="especies.html">Espécies</a>
          <a href="estatisticas.html">Estatísticas</a>
          <a href="backup.html">Backup</a>
          <a href="configuracoes.html">Configurações</a>
          <a href="sobre.html">Sobre</a>
        </nav>
      </header>

      <main class="page-grid">
        <section class="card">
          <h2>Visão geral</h2>
          <div id="dashboard-metrics" class="stats-row"></div>
        </section>
        <section class="card">
          <h2>Gráfico por grupo</h2>
          <canvas id="groupChart"></canvas>
        </section>
        <section class="card">
          <h2>Gráfico por mês</h2>
          <canvas id="monthChart"></canvas>
        </section>
        <section class="card">
          <h2>Gráfico por clima</h2>
          <canvas id="climaChart"></canvas>
        </section>
        <section class="card">
          <h2>Último registro</h2>
          <div id="last-record"></div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/dashboard.js"></script>
  </body>
</html>
